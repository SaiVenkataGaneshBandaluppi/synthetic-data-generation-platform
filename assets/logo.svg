<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="160" rx="12" fill="url(#bgGrad)"/>

  <g transform="translate(18, 28)" filter="url(#glow)">
    <rect x="0" y="0" width="34" height="7" rx="3.5" fill="#00b4d8" opacity="0.9"/>
    <rect x="0" y="12" width="24" height="7" rx="3.5" fill="#00b4d8" opacity="0.6"/>
    <rect x="0" y="24" width="30" height="7" rx="3.5" fill="#00b4d8" opacity="0.75"/>
    <rect x="0" y="36" width="20" height="7" rx="3.5" fill="#00b4d8" opacity="0.5"/>
    <rect x="0" y="48" width="28" height="7" rx="3.5" fill="#00b4d8" opacity="0.65"/>
    <rect x="0" y="60" width="22" height="7" rx="3.5" fill="#00b4d8" opacity="0.55"/>
    <rect x="0" y="72" width="32" height="7" rx="3.5" fill="#00b4d8" opacity="0.8"/>
    <rect x="0" y="84" width="18" height="7" rx="3.5" fill="#00b4d8" opacity="0.45"/>
    <rect x="0" y="96" width="26" height="7" rx="3.5" fill="#00b4d8" opacity="0.7"/>
  </g>

  <g filter="url(#glow)">
    <path d="M72 80 C88 60, 94 80, 110 60" stroke="url(#flowGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M75 80 C91 100, 97 80, 113 100" stroke="url(#flowGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="110" cy="60" r="4" fill="#7b2fff" opacity="0.9"/>
    <circle cx="110" cy="80" r="4" fill="#7b2fff" opacity="0.7"/>
    <circle cx="110" cy="100" r="4" fill="#7b2fff" opacity="0.5"/>
    <line x1="114" y1="60" x2="126" y2="60" stroke="#7b2fff" stroke-width="1.5" opacity="0.8"/>
    <line x1="114" y1="80" x2="126" y2="80" stroke="#7b2fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="114" y1="100" x2="126" y2="100" stroke="#7b2fff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <g transform="translate(134, 28)" filter="url(#glow)">
    <rect x="0" y="0" width="28" height="7" rx="3.5" fill="#06d6a0" opacity="0.85"/>
    <rect x="0" y="12" width="34" height="7" rx="3.5" fill="#06d6a0" opacity="0.7"/>
    <rect x="0" y="24" width="22" height="7" rx="3.5" fill="#06d6a0" opacity="0.6"/>
    <rect x="0" y="36" width="30" height="7" rx="3.5" fill="#06d6a0" opacity="0.75"/>
    <rect x="0" y="48" width="18" height="7" rx="3.5" fill="#06d6a0" opacity="0.5"/>
    <rect x="0" y="60" width="26" height="7" rx="3.5" fill="#06d6a0" opacity="0.65"/>
    <rect x="0" y="72" width="32" height="7" rx="3.5" fill="#06d6a0" opacity="0.8"/>
    <rect x="0" y="84" width="20" height="7" rx="3.5" fill="#06d6a0" opacity="0.55"/>
    <rect x="0" y="96" width="28" height="7" rx="3.5" fill="#06d6a0" opacity="0.7"/>
  </g>

  <text x="196" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="0.5">Synthetic Data</text>
  <text x="196" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="0.5">Generation</text>
  <text x="196" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="0.5">Platform</text>

  <text x="196" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="2">MULTI-AGENT  |  PRIVACY-PRESERVING</text>

  <rect x="1" y="1" width="398" height="158" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
